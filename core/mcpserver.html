<script type="text/html" data-template-name="hal2MCPServer">
    <div class="form-row">
        <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-config-input-name" placeholder="My MCP Server">
    </div>
    <div class="form-row">
        <label for="node-config-input-eventHandler"><i class="fa fa-cog"></i> Event handler</label>
        <input type="text" id="node-config-input-eventHandler">
    </div>
    <div class="form-row">
        <label for="node-config-input-mode"><i class="fa fa-sitemap"></i> Mode</label>
        <select id="node-config-input-mode" style="width:calc(100% - 105px)">
            <option value="embedded">Embedded — use existing /mcp endpoint</option>
            <option value="standalone">Standalone — new endpoint with own path</option>
        </select>
    </div>
    <div class="form-row" id="row-path">
        <label for="node-config-input-path"><i class="fa fa-link"></i> Path</label>
        <input type="text" id="node-config-input-path" placeholder="jellyfin" style="width:calc(100% - 105px)">
        <div style="margin-top:4px; font-size:0.85em; color:#888">Registers endpoint: POST /mcp/<em>path</em></div>
    </div>
    <div class="form-row" id="row-instructions">
        <label for="node-config-input-instructions" style="vertical-align:top; margin-top:4px"><i class="fa fa-comment"></i> Instructions</label>
        <textarea id="node-config-input-instructions" rows="3" style="width:calc(100% - 105px);" placeholder="Optional instructions for Claude about this server."></textarea>
    </div>
    <div class="form-row" id="row-required-claim">
        <label for="node-config-input-requiredClaim"><i class="fa fa-user-secret"></i> Required claim</label>
        <input type="text" id="node-config-input-requiredClaim" placeholder="groups" style="width:calc(100% - 105px)">
    </div>
    <div class="form-row" id="row-required-value">
        <label for="node-config-input-requiredValue"><i class="fa fa-check"></i> Required value</label>
        <input type="text" id="node-config-input-requiredValue" placeholder="(empty = any authenticated user)" style="width:calc(100% - 105px)">
    </div>
    <div class="form-tips" id="row-required-tip" style="margin-left:105px; margin-bottom:8px;">
        <small>The JWT claim (default <code>groups</code>) must contain the value for this server's tools to be callable. Leave the value empty to allow all authenticated users.</small>
    </div>
</script>

<script type="text/html" data-help-name="hal2MCPServer">
    <p>Config node that exposes custom MCP tools (defined by <code>hal2MCPIn</code>/<code>hal2MCPOut</code>
    pairs wired to it) to MCP clients such as Claude. Always delegates authentication to the
    linked <b>Event handler</b> — MCP must be enabled on that node's <em>MCP</em> tab (identity
    provider, redirect URIs, admin gate, etc. all live there, not here).</p>
    <p><b>Embedded</b> mode (default): tools appear on the Event handler's own shared
    <code>/mcp</code> endpoint, alongside its built-in device tool catalog. Simplest option when
    you just want a couple of extra tools bolted onto the existing home-automation server.</p>
    <p><b>Standalone</b> mode: registers its own <code>POST /mcp/&lt;path&gt;</code> endpoint,
    separate from the Event handler's <code>/mcp</code>. Still authenticated against the same
    Event handler (same identity provider, same OAuth client) — this node has no auth
    configuration of its own — but isolated as its own MCP server, so a client can be pointed
    at just one integration's tools (e.g. all of Jellyfin's) instead of the whole shared
    endpoint. Multiple standalone <code>hal2MCPServer</code> nodes can share one Event handler,
    each with a different path.</p>
    <p>Standalone mode also exposes an optional <b>Required claim</b>/<b>Required value</b> gate:
    when a value is set, only callers whose token carries that claim/value can see or call this
    server's tools — everyone else connects but sees none. This is separate from (and layered on
    top of) the Event handler's own admin-tools gate, and only affects this one standalone
    server, not the shared embedded endpoint.</p>
    <p>See the <a href="https://github.com/flic/node-red-contrib-hal2#readme" target="_blank">project README</a>
    for a worked example (<code>examples/jellyfin-mcp.json</code>).</p>
</script>

<script type="text/javascript">
    RED.nodes.registerType('hal2MCPServer', {
        category : 'config',
        defaults : {
            name         : { value: '' },
            eventHandler : { value: '', type: 'hal2EventHandler', required: true },
            mode          : { value: 'embedded' },
            path          : { value: '' },
            instructions  : { value: '' },
            requiredClaim : { value: 'groups' },
            requiredValue : { value: '' }
        },
        label : function () {
            if (this.mode === 'standalone') return this.name || '/mcp/' + (this.path || '?');
            return this.name || 'embedded';
        },
        oneditprepare: function () {
            function updateVisibility() {
                var standalone = $('#node-config-input-mode').val() === 'standalone';
                $('#row-path').toggle(standalone);
                $('#row-instructions').toggle(standalone);
                $('#row-required-claim').toggle(standalone);
                $('#row-required-value').toggle(standalone);
                $('#row-required-tip').toggle(standalone);
            }
            $('#node-config-input-mode').on('change', updateVisibility);
            updateVisibility();
        }
    });
</script>
