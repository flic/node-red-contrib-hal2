<script type="text/javascript" src="resources/node-red-contrib-hal2/hal.js"></script>

<script type="text/x-red" data-template-name="hal2Value">
    <div class="form-row" id="div-error" hidden>
        <p>No items found. Start by creating some Things.</p>
    </div>
    <div class="form-row" id="div-main">
        <div class="form-row">
            <label for="node-input-action" style="width:95px; padding-right:10px;"><i class="fa fa-exchange"></i> Action</label>
            <select id="node-input-action" style="width:calc(100% - 170px)">
                <option value='get' selected>Get value</option>
                <option value='set'>Set value</option>
            </select>
        </div>
        <div class="form-row">
            <label for="node-input-thing" style="width:95px; padding-right:10px;"><i class="fa fa-microchip"></i> Thing</label>
            <select id="node-input-thing" style="width:calc(100% - 170px)"></select>
            <button id="thing-filter-button"><i class="fa fa-filter"></i></button>
        </div>
        <div class="form-row" id="thing-filter-div" hidden>
            <label for="thing-filter" id="label-thing-filter" style="width:95px; padding-right:10px;"><i class="fa fa-filter"></i> Filter</label>
            <select id="thing-filter" style="width:calc(100% - 170px)"></select>
        </div>
        <div class="form-row" id="row-notes" style="width:100%" hidden>
            <label for="thing-notes" style="width:95px; padding-right:10px;"><i class="fa fa-file"></i> Notes</label>
            <textarea id="thing-notes" style="width:calc(100% - 170px);background-color:#ffe;"></textarea>
        </div>
        <div class="form-row" id="div-type" hidden>
            <label for="node-input-thingType" style="width:95px; padding-right:10px;"><i class="fa fa-gears"></i> Type</label>
            <select id="node-input-thingType" style="width:calc(100% - 170px)"></select>
        </div>
        <div class="form-row">
            <label for="node-input-item" style="width:95px; padding-right:10px;"><i class="fa fa-sitemap"></i> Item</label>
            <select id="node-input-item" style="width:calc(100% - 170px)"></select>
        </div>
        <div class="form-row" id="row-item-notes" style="width:100%" hidden>
            <label for="item-notes" style="width:95px; padding-right:10px;"><i class="fa fa-file"></i> Notes</label>
            <textarea id="item-notes" style="width:calc(100% - 170px);background-color:#ffe;"></textarea>
        </div>
        <div class="form-row">
            <label for="node-input-outputValue" style="width:95px; padding-right:10px;"><i class="fa fa-ellipsis-h"></i> Property</label>
            <input type="text" id="node-input-outputValue" placeholder="payload" style="width:calc(100% - 170px)">
            <input type="hidden" id="node-input-outputType">
        </div>
        <div class="form-row">
            <label for="node-input-outputInfo" style="width:95px; padding-right:10px;"><i class="fa fa-info"></i> Item info</label>
            <input type="checkbox" id="node-input-outputInfo" style="display: inline-block; width: auto; vertical-align: top;">
        </div>
        <div class="form-row" id="row-history-mode" hidden>
            <label for="node-input-historyMode" style="width:95px; padding-right:10px;"><i class="fa fa-history"></i> History</label>
            <input type="checkbox" id="node-input-historyMode" style="display: inline-block; width: auto; vertical-align: top;">
        </div>
        <div class="form-row" id="row-history-range-mode" hidden>
            <label for="node-input-historyRangeMode" style="width:95px; padding-right:10px;"><i class="fa fa-calendar"></i> Range</label>
            <select id="node-input-historyRangeMode" style="width:calc(100% - 170px)">
                <option value="relative" selected>Relative</option>
                <option value="absolute">Absolute</option>
            </select>
        </div>
        <div class="form-row" id="row-history-from" hidden>
            <label style="width:95px; padding-right:10px;"><i class="fa fa-clock-o"></i> From</label>
            <input type="number" id="node-input-historyFrom" min="1" value="24" style="width:60px;">
            <select id="node-input-historyFromUnit" style="width:90px; margin-left:6px;">
                <option value="minutes">minutes</option>
                <option value="hours" selected>hours</option>
                <option value="days">days</option>
            </select>
            <span style="margin-left:6px;">ago</span>
        </div>
        <div class="form-row" id="row-history-to" hidden>
            <label style="width:95px; padding-right:10px;"><i class="fa fa-clock-o"></i> To</label>
            <input type="number" id="node-input-historyTo" min="0" value="0" style="width:60px;">
            <select id="node-input-historyToUnit" style="width:90px; margin-left:6px;">
                <option value="minutes">minutes</option>
                <option value="hours" selected>hours</option>
                <option value="days">days</option>
            </select>
            <span style="margin-left:6px;">ago (0 = now)</span>
        </div>
        <div class="form-row" id="row-history-from-abs" hidden>
            <label for="node-input-historyFromDate" style="width:95px; padding-right:10px;"><i class="fa fa-calendar-o"></i> From</label>
            <input type="datetime-local" id="node-input-historyFromDate" style="width:calc(100% - 170px)">
        </div>
        <div class="form-row" id="row-history-to-abs" hidden>
            <label for="node-input-historyToDate" style="width:95px; padding-right:10px;"><i class="fa fa-calendar-o"></i> To</label>
            <input type="datetime-local" id="node-input-historyToDate" style="width:calc(100% - 170px)">
        </div>
        <div class="form-row" id="row-history-sources" hidden>
            <label style="width:95px; padding-right:10px;"><i class="fa fa-filter"></i> Sources</label>
            <input type="checkbox" id="node-input-historySourceExternal" style="display:inline-block; width:auto; vertical-align:middle;">
            <label for="node-input-historySourceExternal" style="width:auto; margin:0 10px 0 4px;">external</label>
            <input type="checkbox" id="node-input-historySourceHal2" style="display:inline-block; width:auto; vertical-align:middle;">
            <label for="node-input-historySourceHal2" style="width:auto; margin:0 10px 0 4px;">hal2</label>
            <input type="checkbox" id="node-input-historySourceHeartbeat" style="display:inline-block; width:auto; vertical-align:middle;">
            <label for="node-input-historySourceHeartbeat" style="width:auto; margin:0 0 0 4px;">heartbeat</label>
        </div>
        <div class="form-row" id="row-history-transitions" hidden>
            <label for="node-input-historyTransitionsOnly" style="width:95px; padding-right:10px;"><i class="fa fa-exchange"></i> Transitions</label>
            <input type="checkbox" id="node-input-historyTransitionsOnly" style="display: inline-block; width: auto; vertical-align: top;">
            <label for="node-input-historyTransitionsOnly" style="width:auto; margin-left:4px;">only state changes</label>
        </div>
        <div class="form-row">
            <label for="node-input-name" style="width:95px; padding-right:10px;"><i class="fa fa-tag"></i> Name</label>
            <input type="text" id="node-input-name" placeholder="Name" style="width:calc(100% - 170px)">
        </div>
    </div>
</script>

<script type="text/x-red" data-help-name="hal2Value">
    <p>The Value node is used to either query a specific <i>Item</i> and send the <i>Item</i> value on to the next node, or to update an <i>Item</i> value. In the latter case the ingress function as well as all topic filters are bypassed, the value is updated directly as is. Events are triggered as usual.</p>
    <li><strong>Action</strong>: Get value from <i>Item</i> or set value to <i>Item</i>.</li>
    <li><strong>Item</strong>: Select the <i>Item</i>.</li>
    <li><strong>Property</strong>: Source or destination for <i>Item</i> value.</li>
    <li><strong>Item info</strong>: Output <code>msg.thing</code> and <code>msg.item</code> information. Only works when <code>msg</code> is used for output.</li>
    <li><strong>Name</strong>: Node name.</li>  
</script>

<script type="text/javascript">
    RED.nodes.registerType('hal2Value',{
        category: 'Home Automation',
        color: '#b3b3ff',
        defaults: {
            name:           {},
            action:         {},
            thing:          {},
            thingType:      {},   
            item:           { required: true   },           
            outputValue:      { value: "payload" },
            outputType:       { required: true   },
            outputInfo:       { value: false     },
            historyMode:             { value: false      },
            historyRangeMode:        { value: 'relative' },
            historyFrom:             { value: 24         },
            historyFromUnit:         { value: 'hours'    },
            historyTo:               { value: 0          },
            historyToUnit:           { value: 'hours'    },
            historyFromDate:         { value: ''         },
            historyToDate:           { value: ''         },
            historySourceExternal:   { value: true       },
            historySourceHal2:       { value: true       },
            historySourceHeartbeat:  { value: false      },
            historyTransitionsOnly:  { value: false      }
        },
        inputs:1,
        outputs:1,
        icon: "value.png",
        label: function() {
            return this.name||"value";
        },
        paletteLabel: "value",
        oneditprepare: function () {

            // Check if Thing has been deleted
            if (this.thing != 0) {
                try {
                    let thing = RED.nodes.node(this.thing);
                    if (typeof thing === 'undefined') {
                        console.error('Thing ID '+this.thing+' is missing.');
                        this.thing = void 0;
                        this.thingType = void 0;
                        this.item = void 0;
                    }
                } catch (error) {
                        console.log('Error: '+error.message);
                }  
            }
            var savedThing = this.thing;
            var savedType = this.thingType;
            var savedItem = this.item;

            var thingsList = halGetThings(RED,'status');
            if (thingsList.length == 0) {
                $("#div-main").hide();
                $("#div-error").show();
                return;
            }
            var thingTypeList = halGetThingTypes(RED,thingsList,true);

            $("#thing-filter").change(function() {
                $("#node-input-thing").children().remove();
                if ($("#thing-filter").val() == 0) {
                    $("#node-input-thing").append($("<option value='0'>- set by msg.thing.id -</option>"));
                }
                for (var d in thingsList) {
                    if (($("#thing-filter").val() == 0) || (thingsList[d].thingType == $("#thing-filter").val())) {
                        $("#node-input-thing").append($("<option></option>").val(thingsList[d].id).text(thingsList[d].name));
                    }
                }
                if ($("#thing-filter").val() == 0) {
                    $("#node-input-thing").val(thingsList[0].id);
                }
                $("#node-input-thing").trigger('change');
            });

            $("#thing-filter-button").on('click', function() {
                        if ($("#thing-filter-div").is(':visible')) {
                            $("#thing-filter-div").hide();
                            if ($("#thing-filter").val() != 0) {
                                $("#thing-filter").val(0);
                                $("#thing-filter").trigger('change');
                            }
                        } else {
                            $("#thing-filter-div").show();
                        }
                    });


            $("#node-input-thing").change(function() {
                if ($("#node-input-thing").val() == '0') {
                    $("#div-type").show();
                    return;
                } else {
                    $("#div-type").hide();
                }

                $("#node-input-item").children().remove();

                //get all items and sort them alphabetically
                let thing = RED.nodes.node($("#node-input-thing").val());
                let thingType = RED.nodes.node(thing.thingType);
                // Show notes
                if (thing.notes) {
                    $("#row-notes").show();
                    $("#thing-notes").val(thing.notes);
                } else {
                    $("#row-notes").hide();
                }
                //Add items
                for (let d in thingType.items) {
                    if (halStatusItem(thingType.items[d])) {
                        $("<option value='" + thingType.items[d].id + "'> " + thingType.items[d].name + "</option>").appendTo("#node-input-item");
                    }
                }

                if ($("#node-input-thing").val() == savedThing) {
                    $("#node-input-item").val(savedItem);
                }
                $("#node-input-item").trigger('change');
            });

            var historyDetailRows = [
                "#row-history-range-mode",
                "#row-history-from", "#row-history-to",
                "#row-history-from-abs", "#row-history-to-abs",
                "#row-history-sources", "#row-history-transitions"
            ];

            function hideHistoryDetails() {
                historyDetailRows.forEach(function(sel) { $(sel).hide(); });
            }

            function showHistoryDetails() {
                $("#row-history-range-mode").show();
                $("#row-history-sources").show();
                $("#row-history-transitions").show();
                if ($("#node-input-historyRangeMode").val() === 'absolute') {
                    $("#row-history-from").hide(); $("#row-history-to").hide();
                    $("#row-history-from-abs").show(); $("#row-history-to-abs").show();
                } else {
                    $("#row-history-from-abs").hide(); $("#row-history-to-abs").hide();
                    $("#row-history-from").show(); $("#row-history-to").show();
                }
            }

            function updateHistoryVisibility() {
                var isGet = $("#node-input-action").val() === 'get';
                if (!isGet) { $("#row-history-mode").hide(); hideHistoryDetails(); return; }
                var thingType;
                if ($("#node-input-thing").val() == '0') {
                    thingType = RED.nodes.node($("#node-input-thingType").val());
                } else {
                    var t = RED.nodes.node($("#node-input-thing").val());
                    thingType = t ? RED.nodes.node(t.thingType) : null;
                }
                var itemId = $("#node-input-item").val();
                var itemHasHistory = false;
                if (thingType && thingType.items) {
                    for (var d in thingType.items) {
                        if (thingType.items[d].id == itemId && thingType.items[d].history) {
                            itemHasHistory = true; break;
                        }
                    }
                }
                if (itemHasHistory) {
                    $("#row-history-mode").show();
                    if ($("#node-input-historyMode").is(':checked')) { showHistoryDetails(); }
                    else { hideHistoryDetails(); }
                } else {
                    $("#row-history-mode").hide();
                    hideHistoryDetails();
                }
            }

            $("#node-input-historyMode").on('change', function() {
                if ($(this).is(':checked')) { showHistoryDetails(); }
                else { hideHistoryDetails(); }
            });

            $("#node-input-historyRangeMode").on('change', function() {
                if ($("#node-input-historyMode").is(':checked')) { showHistoryDetails(); }
            });

            $("#node-input-action").on('change', updateHistoryVisibility);

            $("#node-input-item").change(function() {
                $("#row-item-notes").hide();
                if ($("#node-input-thing").val() == '0') {
                    var thingType = RED.nodes.node($("#node-input-thingType").val());
                } else {
                    var thing = RED.nodes.node($("#node-input-thing").val());
                    var thingType = RED.nodes.node(thing.thingType);
                }
                var item = $("#node-input-item").val();
                for (let d in thingType.items) {
                    if (thingType.items[d].id == item) {
                        if (thingType.items[d].notes) {
                            $("#row-item-notes").show();
                            $("#item-notes").val(thingType.items[d].notes);
                        }
                        break;
                    }
                }
                updateHistoryVisibility();
            });

            $("#node-input-thingType").change(function() {
                if ($("#node-input-thingType").is(':hidden')) { return; }
                $("#node-input-item").children().remove();

                //get all items and sort them alphabetically
                let thingType = RED.nodes.node($("#node-input-thingType").val());
                //Add items
                for (let d in thingType.items) {
                    if (halStatusItem(thingType.items[d])) {
                        $("<option value='" + thingType.items[d].id + "'> " + thingType.items[d].name + "</option>").appendTo("#node-input-item");
                    }
                }

                if ($("#node-input-thingType").val() == savedType) {
                    $("#node-input-item").val(savedItem);
                }
                $("#node-input-item").trigger('change');
            });

            //Add types
            for (var d in thingTypeList) {
                $("#node-input-thingType").append($("<option value='" + thingTypeList[d].id + "'> " + thingTypeList[d].name + "</option>"));
            }

            //Add filter types
            $("#thing-filter").append($("<option></option>").val(0).text("<All types>"));
            for (let d in thingTypeList) {
                $("#thing-filter").append($("<option></option>").val(thingTypeList[d].id).text(thingTypeList[d].name));
            }

            $("#thing-filter").trigger('change');

            if (typeof this.thingType !== 'undefined') {
                $("#node-input-thingType").val(this.thingType);
            }

            if (typeof this.thing !== 'undefined') {
                $("#node-input-thing").val(this.thing);
            } else {
                $("#node-input-thing").val(thingsList[0].id);
            }

            if ($("#node-input-thing").val() == '0') {
                $('#node-input-thingType').trigger('change');
            } else {
                $('#node-input-thing').trigger('change');
            }

            //Add output
            $('#node-input-outputValue').typedInput({
                default: 'msg',
                typeField: $("#node-input-outputType"),
                types: ['flow','global','msg']
            });

            if (this.outputType) {
                $("#node-input-outputValue").typedInput('type',this.outputType);
            }
            if (this.outputValue) {
                $("#node-input-outputValue").typedInput('value',this.outputValue);
            }
            if (typeof this.action == 'undefined') {
                $("#node-input-action").val('get');
            }

            // `info` is reserved by Node-RED as the per-node markdown documentation
            // and crashes marked() if non-string. Field renamed; old value preserved.
            var outputInfoVal = (typeof this.outputInfo !== 'undefined') ? this.outputInfo : (this.info || false);
            $("#node-input-outputInfo").prop('checked', outputInfoVal);
            this.info = undefined;

            $("#node-input-historyMode").prop('checked', this.historyMode || false);
            $("#node-input-historyRangeMode").val(this.historyRangeMode || 'relative');
            if (this.historyFrom) { $("#node-input-historyFrom").val(this.historyFrom); }
            if (this.historyFromUnit) { $("#node-input-historyFromUnit").val(this.historyFromUnit); }
            if (typeof this.historyTo !== 'undefined') { $("#node-input-historyTo").val(this.historyTo); }
            if (this.historyToUnit) { $("#node-input-historyToUnit").val(this.historyToUnit); }
            if (this.historyFromDate) { $("#node-input-historyFromDate").val(this.historyFromDate); }
            if (this.historyToDate) { $("#node-input-historyToDate").val(this.historyToDate); }
            $("#node-input-historySourceExternal").prop('checked', this.historySourceExternal !== false);
            $("#node-input-historySourceHal2").prop('checked', this.historySourceHal2 !== false);
            $("#node-input-historySourceHeartbeat").prop('checked', this.historySourceHeartbeat === true);
            $("#node-input-historyTransitionsOnly").prop('checked', this.historyTransitionsOnly || false);
            updateHistoryVisibility();
        }
    });
</script>
