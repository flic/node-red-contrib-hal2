<script type="text/html" data-template-name="hal2MCPIn">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-mcpServer"><i class="fa fa-server"></i> MCP Server</label>
        <input type="text" id="node-input-mcpServer">
    </div>
    <div class="form-row">
        <label for="node-input-toolName"><i class="fa fa-terminal"></i> Tool name</label>
        <input type="text" id="node-input-toolName" placeholder="my_tool" style="width:calc(100% - 105px)">
    </div>
    <div class="form-row">
        <label for="node-input-description"><i class="fa fa-comment"></i> Description</label>
        <textarea id="node-input-description" rows="3" style="width:calc(100% - 105px);" placeholder="Describe what this tool does so Claude knows when to use it."></textarea>
    </div>
    <div class="form-row">
        <label for="node-input-inputSchema" style="vertical-align:top; margin-top:4px"><i class="fa fa-code"></i> Parameters</label>
        <textarea id="node-input-inputSchema" rows="8" style="width:calc(100% - 105px); font-family:monospace; font-size:12px;"></textarea>
    </div>
    <div class="form-row">
        <label for="node-input-topic"><i class="fa fa-tag"></i> msg.topic</label>
        <input type="text" id="node-input-topic" placeholder="(defaults to tool name)" style="width:calc(100% - 105px)">
    </div>
    <div class="form-row">
        <label for="node-input-timeout"><i class="fa fa-clock-o"></i> Timeout</label>
        <input type="number" id="node-input-timeout" style="width:80px" min="1" value="30"> seconds
    </div>
    <div class="form-row">
        <label for="node-input-exposeClaims" style="width:auto"><i class="fa fa-id-card-o"></i> Expose JWT claims</label>
        <input type="checkbox" id="node-input-exposeClaims" style="width:23px; margin:0">
        <label for="node-input-exposeClaims" style="margin:0; width:auto;"> Set msg.jwtClaims with the verified JWT payload</label>
    </div>
    <div class="form-tips" style="margin-left:105px;">
        <small>Claims may contain email, sub, groups, etc. — treat as sensitive data and avoid careless logging.</small>
    </div>
</script>

<script type="text/html" data-help-name="hal2MCPIn">
    <p>Defines one MCP tool. When Claude (or another MCP client) calls it, this node fires a
    message out of its single output — there's nothing to wire into it, it's a call trigger,
    not a regular flow step.</p>
    <p>The output message carries:</p>
    <ul>
        <li><code>msg.payload</code> — the tool call arguments, shaped by <b>Parameters</b> below.</li>
        <li><code>msg._mcpCallId</code> — an opaque id identifying this specific call.</li>
        <li><code>msg.topic</code> — set to the <b>msg.topic</b> field below, or the tool name if left blank.</li>
        <li><code>msg.jwtClaims</code> — the caller's verified JWT claims, only when <b>Expose JWT claims</b> is on.</li>
    </ul>
    <p>Wire the rest of the flow to do the actual work, then finish with a <code>hal2MCPOut</code>
    node pointed at the <em>same</em> MCP Server. <code>msg._mcpCallId</code> must reach that
    <code>hal2MCPOut</code> unchanged — if a function node rebuilds <code>msg</code> from scratch
    instead of mutating/returning the original, carry this property over explicitly, or the
    call can never be resolved and the caller sees a timeout.</p>
    <p>Only wire one <code>hal2MCPOut</code> to eventually receive each call — the first message
    that arrives with a given <code>_mcpCallId</code> resolves the call; any later one for the
    same id is silently dropped.</p>
    <p><b>Tool name</b> must be unique among the tools on the same MCP Server; it's the literal
    name Claude calls. <b>Description</b> is shown to Claude and is the main signal it uses to
    decide when to invoke this tool — be specific about what it does and when to use it.
    <b>Parameters</b> is a JSON-Schema object describing the call arguments (becomes
    <code>msg.payload</code>'s shape). <b>Timeout</b> is how long the flow has to reach a
    <code>hal2MCPOut</code> before the client is told the call timed out.</p>
    <p>See the <a href="https://github.com/flic/node-red-contrib-hal2#readme" target="_blank">project README</a>
    for a worked example (<code>examples/jellyfin-mcp.json</code>).</p>
</script>

<script type="text/javascript">
    RED.nodes.registerType('hal2MCPIn', {
        category: 'Home Automation',
        color: '#b3b3ff',
        defaults  : {
            name        : { value: '' },
            mcpServer   : { value: '', type: 'hal2MCPServer', required: true },
            toolName    : { value: '', required: true },
            description : { value: '' },
            inputSchema : { value: '' },
            topic       : { value: '' },
            timeout     : { value: 30 },
            exposeClaims: { value: false }
        },
        inputs    : 0,
        outputs   : 1,
        icon      : 'font-awesome/fa-sign-out',
        paletteLabel: 'MCP In',
        label     : function () { return this.name || this.toolName || 'MCP In'; },
        oneditprepare: function () {
            if (!this.inputSchema) {
                $('#node-input-inputSchema').val(JSON.stringify({
                    type: 'object',
                    properties: {
                        param1: { type: 'string', description: 'Description of param1' }
                    }
                }, null, 2));
            }
        },
        oneditsave: function () {
            var schema = $('#node-input-inputSchema').val();
            if (schema) {
                try { JSON.parse(schema); }
                catch (e) { RED.notify('Parameters JSON is invalid: ' + e.message, 'error'); }
            }
        }
    });
</script>
