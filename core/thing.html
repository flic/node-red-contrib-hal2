<script type="text/javascript" src="resources/node-red-contrib-hal2/hal.js"></script>

<script type="text/x-red" data-template-name="hal2Thing">
    <div class="form-row">
        <label for="node-input-eventHandler" style="width:95px; padding-right:10px;"><i class="fa fa-ellipsis-h"></i> Event handler</label>
        <input type="text" id="node-input-eventHandler" style="width:calc(100% - 125px)" placeholder="Event handler">
    </div>
    <div class="form-row">
        <label for="node-input-thingType" style="width:95px; padding-right:10px;"><i class="fa fa-bookmark"></i> Type</label>
        <input type="text" id="node-input-thingType" style="width:calc(100% - 125px)" placeholder="Type">
    </div>
    <div class="form-row">
        <label for="node-input-topicFilterMode" style="width:95px; padding-right:10px;"><i class="fa fa-filter"></i> Filters</label>
        <select id="node-input-topicFilterMode" style="width:70px; vertical-align:top; margin-top:3px;">
            <option value="and">AND</option>
            <option value="or">OR</option>
        </select>
    </div>
    <div class="form-row">
        <ol id="thing-filter-list"></ol>
    </div>
    <div class="form-row">
        <label for="node-input-topicPrefix" style="width:95px; padding-right:10px;"><i class="fa fa-tasks"></i> Topic</label>
        <input type="text" id="node-input-topicPrefix" style="width:calc(100% - 170px)">
    </div>
    <div class="form-row">
        <label for="node-input-name" style="width:95px; padding-right:10px;"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name" style="width:calc(100% - 170px)">
        <button id="info"><i class="fa fa-info-circle"></i></button>
    </div>
    <div class="form-row">
        <label for="node-input-notes" style="width:95px; padding-right:10px;"><i class="fa fa-file"></i> Notes</label>
        <textarea id="node-input-notes" style="width:calc(100% - 170px)"></textarea>
    </div>
    <div class="form-row">
        <label for="node-input-tags" style="width:95px; padding-right:10px;"><i class="fa fa-tags"></i> Tags</label>
        <input type="text" id="node-input-tags" placeholder="comma,separated,tags" style="width:calc(100% - 170px)">
    </div>
    <div class="form-row" id="attributes"  style="width:100%" hidden>
        <label><i class="fa fa-tags"></i> Attributes</label>
        <ol id="attributes-list"></ol>
    </div>
    <div class="form-row" id="thing-groups" style="width:100%">
        <label><i class="fa fa-object-group"></i> Groups</label>
        <div id="thing-groups-header" style="width:100%; padding-right:28px; box-sizing:border-box; color:#888; font-size:0.85em; margin-bottom:4px; white-space:nowrap;"><span style="display:inline-block; width:calc(50% - 14px); margin-right:4px;">Item</span><span style="display:inline-block; width:16px;"></span><span style="display:inline-block; width:calc(50% - 14px); margin-left:4px;">Group</span></div>
        <ol id="thing-groups-container"></ol>
    </div>
</script>

<script type="text/x-red" data-help-name="hal2Thing">
    <p>The Thing node is a virtual representation of a physical device, like a switch or a sensor. The Thing <i>type</i> defines the functions of the device as a list of <i>items</i> where each item corresponds to a specific measurement or command. For example: a <i>sensor<i> Thing Type might have a temperature-item and a humidity-item. A <i>switch</i> Thing Type might have a relay0 and a relay1 item. It can be queried by the <i>Value</i>, <i>Gate</i> and <i>Action</i> nodes and can trigger an event using <i>Event</i> nodes.</p>
    <li><strong>Event handler</strong>: Used for firing events between nodes. Use the same config for all nodes that should be able to communicate.</li>
    <li><strong>Topic filter</strong>: If configured, this parameter must match <code>msg.topic</code> on the incoming message. If not, the message is dropped. <i>Topic filter</i> can be a text string, a regex expression or an MQTT-formatted topic with + and # wildcards.</li>
    <li><strong>Topic</strong>: Used for filtering and creating item specific command topics. Will become <code>msg.topic</code> for outgoing messages.</li>
    <li><strong>Name</strong>: Node name, used to select the Thing in <i>Value</i>, <i>Gate</i>, <i>Action</i> and <i>Event</i> nodes.</li>    
    <li><strong>Notes</strong>: Thing specific notes. Exposed to MCP clients to help them understand what the device does.</li>
    <li><strong>Tags</strong>: Comma-separated keywords (e.g. "outdoor, lake, dock"). Also exposed to MCP clients for filtering and semantic context.</li>
</script>

<script type="text/javascript">
    RED.nodes.registerType('hal2Thing', {
        category: 'Home Automation',
        color: '#b3b3ff',
        defaults: {
            eventHandler: {
                value: "Event handler",
                type: "hal2EventHandler",
                required: true
            },
            thingType: {
                value: "Type",
                type: "hal2ThingType",
                required: true
            },
            name:           { 
                required: true, 
                validate:function(v) {
                    //Check for name collisions
                    const thingsList = RED.nodes.filterNodes({type: "hal2Thing"});
                    if(thingsList.length===0){ return true; }
                    for (var d in thingsList) {
                        if (v == thingsList[d].name && thingsList[d].id !== this.id) { return false; }
                    }
                    return true;
                }
            },
            attributes:         {},
            topicFilters:       { value: [] },
            topicFilterMode:    { value: 'and' },
            topicFilter:        {},
            topicFilterType:    {},
            topicPrefix:        { value: "" },
            notes:              {},
            tags:               { value: '' },
            groups:             { value: [] }, //[{ item, group }] group membership
            outputs:            { value: 0 } //Store if outputs are enabled
        },
        inputs: 1,
        outputs: 1,
        icon: "thing.png",
        label: function () {
            return this.name || "thing";
        },
        paletteLabel: "thing",
        oneditprepare: function () {
            var node = this;
            $("#node-input-tags").val(Array.isArray(node.tags) ? node.tags.join(', ') : (node.tags || ''));
            var typeMQTT = halTypeMQTT();
            var StrStartType   = { value: "StrStart",   label: "starts with", hasValue: true };
            var StrEndType     = { value: "StrEnd",     label: "ends with",   hasValue: true };
            var StrContainsType= { value: "StrContain", label: "contains",    hasValue: true };

            // Incoming filter list
            $('#thing-filter-list').editableList({
                addItem: function(container, i, filter) {
                    var row = $('<div/>').appendTo(container);
                    var fieldInput = $('<input/>', {type:'text', class:'thing-filter-field', style:'width:160px; margin-right:5px;'}).appendTo(row);
                    fieldInput.typedInput({ types: ['msg'] });
                    fieldInput.typedInput('value', filter.field || 'topic');

                    var matchInput = $('<input/>', {type:'text', class:'thing-filter-match', style:'width:calc(100% - 175px)'}).appendTo(row);
                    matchInput.typedInput({ default:'mqtt', types:['str','re',typeMQTT,StrStartType,StrEndType,StrContainsType] });
                    if (filter.matchType) {
                        matchInput.typedInput('type', filter.matchType);
                        matchInput.typedInput('value', filter.value || '');
                    }
                },
                removable: true,
                sortable: false,
                addButton: 'Add filter'
            });

            // Load existing filters — migrate old single-filter format if needed
            var filters = this.topicFilters;
            if ((!filters || filters.length === 0) && this.topicFilter) {
                filters = [{ field: 'topic', matchType: this.topicFilterType || 'mqtt', value: this.topicFilter }];
            }
            if (filters && filters.length > 0) {
                var list = $('#thing-filter-list');
                filters.forEach(function(f) { list.editableList('addItem', f); });
            }

            //Outgoing topic
            if (this.topicPrefix) {
                $("#node-input-topicPrefix").val(this.topicPrefix);                         
            }

            //Attributes list
            $("#attributes-list").editableList({
                addItem: function(container,i,opt) {
                    var attribute = opt;
                    container.css({
                        overflow: 'hidden',
                        whiteSpace: 'nowrap'
                    });

                    var rowAttrName = $('<div/>').appendTo(container);
                    var rowNotes = $('<div/>',{style:"margin-top:8px;"})
                        .appendTo(container)
                        .hide()

                    var labelAttrName = $('<div/>',{style:"display:inline-block;text-align:left; width:102px; padding-right:10px; box-sizing:border-box;",class:"fa fa-tag"})
                        .appendTo(rowAttrName)
                        .append(' '+attribute.name)
                    var labelNotes = $('<div/>',{style:"display:inline-block;text-align:left; width:102px; padding-right:10px; box-sizing:border-box;",class:"fa fa-file"})
                        .appendTo(rowNotes)
                        .append(' Notes') 

                    var valueProperty = $('<input/>',{style: "padding-right:10px; width: calc(100% - 158px)",class:"attribute-value-property",type:"text"})
                        .appendTo(rowAttrName)
                        .prop('required',attribute.required)
                        .val(attribute.val)
                    var idProperty = $('<input/>',{class:"attribute-id-property",type:"hidden"})
                        .appendTo(rowAttrName)
                        .val(attribute.id)
                    var notesField = $('<textarea/>',{style:"width:calc(100% - 158px); background-color:#ffe;"})
                        .appendTo(rowNotes)
                        .val(attribute.notes)
                    if (attribute.notes) {
                        rowNotes.show();
                    }
                },
                removable: false,
                sortable: false,
                addButton: false
            });

            $("#node-input-thingType").change( function () {
                let thingType = RED.nodes.node($("#node-input-thingType").val());
                if (typeof thingType == 'undefined') { return; }

                // Attributes
                $('#attributes').hide();
                if ((typeof thingType.attributes === 'object') && (Object.keys(thingType.attributes).length != 0)) {
                    //Show attribute list and add attribute values
                    $('#attributes-list').editableList('empty');
                    $("#attributes").show();
                    for (let d in thingType.attributes) {
                        let attribute = [];
                        attribute.id = thingType.attributes[d].id;
                        attribute.name = thingType.attributes[d].name;
                        attribute.required = thingType.attributes[d].required;
                        attribute.notes = thingType.attributes[d].notes;
                        attribute.val = "";
                        if ((typeof node.attributes === 'object') && (Object.keys(node.attributes).length != 0)) {
                            for (let a in node.attributes) {
                                if (thingType.attributes[d].id == node.attributes[a].id) {
                                    attribute.val = node.attributes[a].val;
                                    break;
                                }
                            }
                        }
                        $("#attributes-list").editableList('addItem',attribute);
                    }
                }
            });

            // ── Group membership ──────────────────────────────────────────────
            // Vertical editableList: each row is one membership = an item paired with
            // a compatible group. "Add group" appends a row. The group dropdown is
            // filtered to groups whose family matches the chosen item (or 'other').
            function thingGroupItems() {
                var tt = RED.nodes.node($("#node-input-thingType").val());
                return (tt && Array.isArray(tt.items)) ? tt.items.filter(function(it) { return it.id !== '1'; }) : [];
            }
            function thingGroupGroups() {
                var eh = RED.nodes.node($("#node-input-eventHandler").val());
                return (eh && Array.isArray(eh.groups)) ? eh.groups : [];
            }

            $("#thing-groups-container").editableList({
                addItem: function(container, i, opt) {
                    var membership = opt || {};
                    var items = thingGroupItems();
                    var groups = thingGroupGroups();
                    container.css({ overflow: 'hidden', whiteSpace: 'nowrap' });

                    var row = $('<div/>').appendTo(container);
                    var itemSel = $('<select/>', { class: "thing-group-item", style: "width:calc(50% - 14px); margin-right:4px;" }).appendTo(row);
                    $('<i/>', { class: "fa fa-long-arrow-right", style: "width:16px; text-align:center; color:#888; vertical-align:middle;" }).appendTo(row);
                    var groupSel = $('<select/>', { class: "thing-group-group", style: "width:calc(50% - 14px); margin-left:4px;" }).appendTo(row);

                    items.forEach(function(it) {
                        itemSel.append($("<option></option>").val(it.id)
                            .text(it.name + (it.haType ? ' (' + it.haType + ')' : '')));
                    });

                    function repopulateGroups() {
                        var it = items.find(function(x) { return x.id === itemSel.val(); });
                        var itemHaType = it ? (it.haType || '') : '';
                        var prev = groupSel.val();
                        groupSel.children().remove();
                        var compatible = groups.filter(function(g) {
                            return halGroupAccepts(g.haType, itemHaType);
                        });
                        if (compatible.length === 0) {
                            groupSel.append($("<option></option>").val('').text('— no compatible group —'));
                            return;
                        }
                        compatible.forEach(function(g) {
                            groupSel.append($("<option></option>").val(g.id)
                                .text(g.name + (g.haType === 'other' ? ' [mixed]' : '')));
                        });
                        if (prev) { groupSel.val(prev); }
                    }
                    itemSel.change(repopulateGroups);

                    if (membership.item) { itemSel.val(membership.item); }
                    repopulateGroups();
                    if (membership.group) { groupSel.val(membership.group); }
                },
                removable: true,
                sortable: false,
                addButton: "Add group"
            });

            (Array.isArray(node.groups) ? node.groups : []).forEach(function(m) {
                $("#thing-groups-container").editableList('addItem', m);
            });

            $("#node-input-thingType").trigger('change');

            $('#info').click(function() {
                let message = '<font size=+1>Included in</font><br><table style="border-collapse: separate;border-spacing: 10px;"><tr><th style="text-align: left;">Type</th><th style="text-align: left;">Name</th><th style="text-align: left;">Workspace</th></tr>';
                try {
                    let actions = RED.nodes.filterNodes({type: "hal2Action"});
                    for (let i in actions) {
                        let action = RED.nodes.node(actions[i].id);
                        for (let c in action.commandset) {
                            if ((action.commandset[c].category == 'hal2Thing') && (action.commandset[c].thing == node.id)) {
                                let workspace = RED.nodes.workspace(action.z);
                                message += '<tr><td><b>Action</b></td><td>'+action.name+'</td><td>'+workspace.label+'</td></tr>';
                                break;
                            }
                        }
                    }

                    let events = RED.nodes.filterNodes({type: "hal2Event"});
                    for (let i in events) {
                        let event = RED.nodes.node(events[i].id);
                        if ((event.typeSel == 'hal2Thing') && (event.thing == node.id)) {
                            let workspace = RED.nodes.workspace(event.z);
                            message += '<tr><td><b>Event</b></td><td>'+event.name+'</td><td>'+workspace.label+'</td></tr>';
                            break;
                        }
                    }

                    let gates = RED.nodes.filterNodes({type: "hal2Gate"});
                    for (let i in gates) {
                        let gate = RED.nodes.node(gates[i].id);
                        for (let c in gate.rules) {
                            if (gate.rules[c].thing == node.id) {
                                let workspace = RED.nodes.workspace(gate.z);
                                message += '<tr><td><b>Gate</b></td><td>'+gate.name+'</td><td>'+workspace.label+'</td></tr>';
                                break;
                            }
                        }
                    }

                    let eh = RED.nodes.node(node.eventHandler);
                    let ehGroups = (eh && Array.isArray(eh.groups)) ? eh.groups : [];
                    let myGroupIds = new Set((Array.isArray(node.groups) ? node.groups : []).map(m => m.group));
                    for (let g of ehGroups) {
                        if (myGroupIds.has(g.id)) {
                            message += '<tr><td><b>Group</b></td><td>'+g.name+'</td><td>Event handler</td></tr>';
                        }
                    }

                    let values = RED.nodes.filterNodes({type: "hal2Value"});
                    for (let i in values) {
                        let value = RED.nodes.node(values[i].id);
                        if (value.thing == node.id) {
                            let workspace = RED.nodes.workspace(value.z);
                            message += '<tr><td><b>Value</b></td><td>'+value.name+'</td><td>'+workspace.label+'</td></tr>';
                            break;
                        }
                    }
                    message += '</table>'
                }  catch (error) {
                        console.log('Error: '+error.message);
                }
                RED.notify(message,{ timeout: 10000 });
            });
        },
        oneditsave: function () {
            var node = this;

            node.tags = ($("#node-input-tags").val() || '').split(',').map(t => t.trim()).filter(Boolean);

            // Group membership — one {item, group} per editableList row
            node.groups = [];
            $("#thing-groups-container").editableList('items').each(function() {
                var r = $(this);
                var item  = r.find('.thing-group-item').val();
                var group = r.find('.thing-group-group').val();
                if (item && group) {
                    node.groups.push({ item: item, group: group });
                }
            });

            node.topicFilters = [];
            $('#thing-filter-list').editableList('items').each(function() {
                var item = $(this);
                node.topicFilters.push({
                    field:     item.find('.thing-filter-field').typedInput('value'),
                    matchType: item.find('.thing-filter-match').typedInput('type'),
                    value:     item.find('.thing-filter-match').typedInput('value')
                });
            });
            node.topicFilter = '';
            node.topicFilterType = '';

            let TT = $("#node-input-thingType").val();
            if (TT) {
                var thingType = RED.nodes.node(TT);
                if (typeof thingType.thingOutput == 'undefined') { thingType.thingOutput = thingType.thingCommand; }
                if (typeof thingType.outputs == 'undefined') { thingType.outputs = 1; }
                if (thingType.thingOutput) {
                    this.outputs = thingType.outputs;
                } else {
                    this.outputs = 0;
                }
            }

            node.attributes = [];
            $("#attributes-list")
                .editableList('items')
                .each(function() {
                    let item = $(this);
                    let r = {
                        id:item.find(".attribute-id-property").val(),
                        val:item.find(".attribute-value-property").val()
                    }
                    node.attributes.push(r);
                })
        }
    });
</script>
