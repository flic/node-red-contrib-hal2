<script type="text/x-red" data-help-name="hal2ThingType">
    <p>The Thing <i>type</i> defines the functions of the device as a list of <i>items</i> where each item corresponds to a specific measurement or command. For example: a <i>sensor</i> Thing Type might have a temperature-item and a humidity-item. A <i>switch</i> Thing Type might have a relay0 and a relay1 item. It can be queried by the <i>Value</i>, <i>Gate</i> and <i>Action</i> nodes and can trigger an event using <i>Event</i> nodes.</p>
    <li><strong>Name</strong>: A describing name for the specific device type. For example, 'Shelly Dimmer'.</li>
    <li><strong>Context store</strong>: The Node-RED context store used to store device values. Please see <a href="https://nodered.org/docs/user-guide/context" target="_blank">Node-RED documentation</a> for more information about different types of context stores. Use file-based storage for persistent context.</li>
    <li><strong>Show state</strong>: A string defining how to show information about state on the node in the Node-RED GUI. Use <code>%Item_name%</code> (case sensitive) to show a specific item value. Leave blank if not wanted.</li>
    <li><strong>Filter function</strong>: It's possible to use an ingress function to filter all incoming messages. If the function returns false the message is dropped.</li>
    <li><strong>Check alive</strong>: Check if device is alive, either by checking for heartbeats or by using MQTT Last Will and Testament information. If checked a specific <i>Alive</i> Item is automatically created. Possible values: true/false.</li>    
    <li><strong>Attributes</strong>: Thing specific attributes. Define the attribute name and if it's mandatory or not, and define attribute values in the Thing configuration. Attributes can be used in ingress or egress functions as <code>attribute.name</code> or <code>attribute["name"]</code>.</li>
    <li><strong>Items</strong>: Define items. See example code on <a href="https://github.com/flic/node-red-contrib-hal2/tree/main/examples" target="_blank">GitHub</a>.</li>
    <li><strong>Items <i>Loopback Command</i></strong>: If the <i>item type</i> is set to Loopback Command no output msg will be sent. The command will instead be routed to the node input, basically a virtual wire between output and input. Standard ingress and egress rules apply, including topic filters and the filter function.</li>
    <li><strong>Item <i>Topic filter</i></strong>: <i>Topic filter</i> is used to filter incoming messages. If <i>Topic filter</i> is of type string and starts with '.' the dot is replaced by the topic value configured for the <i>Thing</i>. If it starts with '/' the topic value is prepended.</li>
    <li><strong>Item <i>Topic</i></strong>: <i>Topic</i> is added to outgoing messages as <code>msg.topic</code>. It's possible to modify the value of <code>msg.topic</code> in the egress function. Topics starting with '.' and '/' works just the same as it does in <i>Topic filter</i>. If <i>Topic</i> is left empty the topic configured for the <i>Thing</i> is used unmodified.</li>
    <li><strong>Output</strong>: It's possible to select which output to use for a specific command. Select which output to use.</li>
</script>

<script type="text/javascript">
    var editors = {};

    function localGetAttributes() {
        let attributes = [];
        $("#node-config-thingtype-list-attributes")
            .editableList('items')
            .each(function() {
                let item = $(this);
                let r = {
                    name:item.find(".node-config-thingtype-attribute-name-property").val(),
                    id:item.find(".node-config-thingtype-attribute-id-property").val(),
                    required:item.find(".node-config-thingtype-attribute-required-property").prop('checked'),
                    notes:item.find(".node-config-thingtype-attribute-notes-property").val()
                }
                attributes.push(r);
            })
        return attributes;
    }

    function parseTags(s) {
        return (s || '').split(',').map(t => t.trim()).filter(Boolean);
    }

    function localGetItems() {
        let items = [];
        $("#node-config-thingtype-list-items")
            .editableList('items')
            .each(function() {
                let item = $(this);
                var itemTopicFilters = [];
                item.find(".node-config-thingtype-filter-list").editableList('items').each(function() {
                    var row = $(this);
                    itemTopicFilters.push({
                        field:     row.find('.tt-filter-field').typedInput('value'),
                        matchType: row.find('.tt-filter-match').typedInput('type'),
                        value:     row.find('.tt-filter-match').typedInput('value')
                    });
                });
                let r = {
                    name:            item.find(".node-config-thingtype-name-property").val(),
                    id:              item.find(".node-config-thingtype-id-property").val(),
                    topicFilters:    itemTopicFilters,
                    topicFilterMode: item.find(".node-config-thingtype-filtermode-property").val() || 'and',
                    topicSuffix:     item.find(".node-config-thingtype-topicsuffix-property").val(),
                    type:            item.find(".node-config-thingtype-itemtype-property").val(),
                    haType:          item.find(".node-config-thingtype-hatype-property").val(),
                    ingress:         item.find(".node-config-thingtype-ingress-property").val(),
                    egress:          item.find(".node-config-thingtype-egress-property").val(),
                    notes:           item.find(".node-config-thingtype-notes-property").val(),
                    tags:            parseTags(item.find(".node-config-thingtype-tags-property").val()),
                    output:          item.find(".node-config-thingtype-output-property").val(),
                    history:            item.find(".node-config-thingtype-history-property").prop('checked'),
                    historyAllUpdates:  item.find(".node-config-thingtype-historyall-property").prop('checked')
                }
                items.push(r);
            })
        return items;
    }

    function getFunctions(fn_type) {
        let f = [];
        $("#node-config-"+fn_type+"-list-items")
            .editableList('items')
            .each(function() {
                let item = $(this);
                let name = item.find(".node-config-"+fn_type+"-name-property").val();
                let id = item.find(".node-config-"+fn_type+"-id-property").val();
                let editorId = fn_type+"-"+id;
                editorId = editorId.split('.').join("");
                let fn = editors[editorId].getValue();
                let r = {
                    name:name,
                    id:id,
                    fn:fn
                }
                f.push(r);
            })
        return f;
    }

    // Discover central functions (ingress/egress library) on all EventHandler configs
    function getCentralFunctions(fn_type) {
        const result = [];
        const prop = fn_type + 'Library';
        RED.nodes.eachConfig(function(cfg) {
            if (cfg.type !== 'hal2EventHandler') return;
            // Always read from the live node object (may have unsaved mutations)
            const live = RED.nodes.node(cfg.id) || cfg;
            const lib = live[prop] || cfg[prop] || [];
            lib.forEach(function(f) {
                result.push({ name: f.name, id: f.id, fn: f.fn, _ehId: cfg.id, _ehName: cfg.name || cfg.label || 'EventHandler' });
            });
        });
        return result;
    }

    // Find a central function by id
    function findCentralFunction(fn_type, id) {
        return getCentralFunctions(fn_type).find(f => f.id === id) || null;
    }

    // List all EventHandler configs (for promote target picker)
    function getAllEventHandlers() {
        const ehs = [];
        RED.nodes.eachConfig(function(cfg) {
            if (cfg.type === 'hal2EventHandler') {
                ehs.push({ id: cfg.id, name: cfg.name || cfg.label || cfg.id });
            }
        });
        return ehs;
    }

    // Refresh all items' ingress/egress dropdowns (preserve selected value)
    function refreshAllItemDropdowns() {
        let itemCount = 0, ingressDropdowns = 0, egressDropdowns = 0;
        const centralIngressCount = getCentralFunctions('ingress').length;
        const centralEgressCount  = getCentralFunctions('egress').length;
        $('#node-config-thingtype-list-items > li').each(function() {
            itemCount++;
            const row = $(this);
            const ingressSel = row.find('.node-config-thingtype-ingress-property');
            if (ingressSel.length) {
                ingressDropdowns++;
                const prev = ingressSel.val();
                populateFnSelect(ingressSel, 'ingress');
                ingressSel.val(prev).trigger('change');
            }
            const egressSel = row.find('.node-config-thingtype-egress-property');
            if (egressSel.length) {
                egressDropdowns++;
                const prev = egressSel.val();
                populateFnSelect(egressSel, 'egress');
                egressSel.val(prev).trigger('change');
            }
        });
        return { itemCount: itemCount, ingressDropdowns: ingressDropdowns, egressDropdowns: egressDropdowns, centralIngressCount: centralIngressCount, centralEgressCount: centralEgressCount };
    }

    // Modal picker — shows items from all ThingTypes, calls callback with selected item
    function pickItemFromThingTypes(opts, callback) {
        opts = opts || {};
        const candidates = [];
        RED.nodes.eachConfig(function(cfg) {
            if (cfg.type !== 'hal2ThingType') return;
            if (cfg.id === opts.excludeTtId) return;
            const items = cfg.items || [];
            items.forEach(function(item) {
                if (opts.filterHaType && item.haType !== opts.filterHaType) return;
                if (item.id === '1') return; // skip heartbeat
                candidates.push({ ttName: cfg.name || cfg.label || cfg.id, ttId: cfg.id, item: item });
            });
        });
        if (candidates.length === 0) {
            RED.notify('No matching items found in other ThingTypes.', 'warning');
            return;
        }

        const overlay = $('<div/>',{style:'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:10000;'}).appendTo('body');
        const modal = $('<div/>',{style:'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;border-radius:4px;width:640px;max-height:70vh;display:flex;flex-direction:column;'}).appendTo(overlay);

        $('<h4/>',{style:'margin-top:0;'}).text(opts.title || 'Pick an item').appendTo(modal);
        if (opts.subtitle) $('<p/>',{style:'color:#888;font-size:0.9em;margin:0 0 10px;'}).text(opts.subtitle).appendTo(modal);

        const searchInput = $('<input/>',{type:'text',placeholder:'Search by ThingType, item name, haType, or ID...',style:'width:100%;margin-bottom:10px;padding:6px;'}).appendTo(modal);
        const listContainer = $('<div/>',{style:'overflow-y:auto;flex:1;border:1px solid #ddd;padding:0;min-height:300px;max-height:400px;'}).appendTo(modal);

        function renderList(filterText) {
            listContainer.empty();
            const filter = (filterText || '').toLowerCase();
            const grouped = {};
            candidates.forEach(c => {
                const text = c.ttName + ' / ' + c.item.name + ' (' + (c.item.haType || 'no type') + ') id=' + c.item.id;
                if (filter && !text.toLowerCase().includes(filter)) return;
                if (!grouped[c.ttName]) grouped[c.ttName] = [];
                grouped[c.ttName].push(c);
            });
            Object.keys(grouped).sort().forEach(ttName => {
                $('<div/>',{style:'padding:6px 10px;background:#f5f5f5;font-weight:bold;border-bottom:1px solid #ddd;'}).text(ttName).appendTo(listContainer);
                grouped[ttName].forEach(c => {
                    const entry = $('<div/>',{style:'padding:6px 14px;cursor:pointer;border-bottom:1px solid #f0f0f0;'})
                        .html('<strong>'+$('<div/>').text(c.item.name).html()+'</strong> <span style="color:#888;">'+(c.item.haType || 'no type')+'</span> <span style="color:#aaa;font-size:0.85em;float:right;">'+c.item.id+'</span>')
                        .appendTo(listContainer);
                    entry.hover(function(){$(this).css('background','#e8f4ff');}, function(){$(this).css('background','white');});
                    entry.click(function() {
                        overlay.remove();
                        callback(c.item, c);
                    });
                });
            });
            if (listContainer.children().length === 0) {
                $('<div/>',{style:'padding:20px;text-align:center;color:#888;'}).text('No matches').appendTo(listContainer);
            }
        }
        renderList();
        searchInput.on('input', function() { renderList($(this).val()); });
        searchInput.focus();

        const btnRow = $('<div/>',{style:'margin-top:10px;text-align:right;'}).appendTo(modal);
        $('<button/>',{type:'button',class:'red-ui-button',style:'padding:4px 12px;'}).text('Cancel').appendTo(btnRow).click(function() { overlay.remove(); });
        overlay.click(function(e) { if (e.target === overlay[0]) overlay.remove(); });
    }

    // Enable Override button only when the currently selected option is in the Shared optgroup
    function updateOverrideBtnState(selectEl, btn) {
        const opt = selectEl.find('option:selected');
        const isShared = opt.length && opt.parent('optgroup').attr('label') === 'Shared';
        btn.prop('disabled', !isShared).css('opacity', isShared ? 1 : 0.4);
    }

    // Copy a central function to the local list with same id (per-ThingType override)
    function overrideCentralFunctionLocally(fn_type, fnId, selectToRefresh) {
        if (!fnId) { RED.notify('No function selected.', 'warning'); return; }
        // Already local?
        let localExists = false;
        $("#node-config-"+fn_type+"-list-items").editableList('items').each(function() {
            if ($(this).find(".node-config-"+fn_type+"-id-property").val() === fnId) localExists = true;
        });
        if (localExists) { RED.notify('Function is already local — no override needed.', 'info'); return; }

        const central = findCentralFunction(fn_type, fnId);
        if (!central) { RED.notify('Central function not found.', 'warning'); return; }

        // Add as a new local entry with the same ID
        $("#node-config-"+fn_type+"-list-items").editableList('addItem', {
            name: central.name + ' (local override)',
            id:   central.id,
            fn:   central.fn
        });

        // Refresh ALL items' dropdowns so the new local entry shows up everywhere
        refreshAllItemDropdowns();
        RED.notify('Override created locally. Edit the local copy to customise.', 'success');
    }

    // Populate a select with local + central options grouped via optgroup
    function populateFnSelect(selectEl, fn_type) {
        const seenIds = new Set();
        selectEl.empty();
        const localGroup = $('<optgroup label="Local"></optgroup>').appendTo(selectEl);
        $("#node-config-"+fn_type+"-list-items").editableList('items').each(function() {
            const item = $(this);
            const name = item.find(".node-config-"+fn_type+"-name-property").val();
            const id   = item.find(".node-config-"+fn_type+"-id-property").val();
            if (id && !seenIds.has(id)) {
                localGroup.append($("<option></option>").val(id).text(name));
                seenIds.add(id);
            }
        });
        const central = getCentralFunctions(fn_type).filter(f => f.id && !seenIds.has(f.id));
        if (central.length) {
            const centralGroup = $('<optgroup label="Shared"></optgroup>').appendTo(selectEl);
            central.forEach(function(f) {
                centralGroup.append($("<option></option>").val(f.id).text(f.name));
                seenIds.add(f.id);
            });
        }
    }

    function addAttributes(attributes) {
        $("#node-config-thingtype-list-attributes").editableList().children().remove();
        if (attributes) {
            for (let d in attributes) {
                let attribute = attributes[d];
                $("#node-config-thingtype-list-attributes").editableList('addItem',attribute);
            }
        }
    }

    function addItems(items) {
        $("#node-config-thingtype-list-items").editableList().children().remove();
        if (items) {
            for (let d in items) {
                let item = items[d];
                if (item.id.length > 1) {
                    $("#node-config-thingtype-list-items").editableList('addItem',item);
                }
            }
        } else {
            $("#node-config-thingtype-list-items").editableList('addItem',null);
        }
    }

    function addFunctions(fn_type,fn) {
        $("#node-config-"+fn_type+"-list-items").editableList().children().remove();
        for (let d in fn) {
            let f = fn[d];
            $("#node-config-"+fn_type+"-list-items").editableList('addItem',f);
        }
    }    

    function updateMainTab(id) {
        $('#node-config-thingtype-list-items > li').each(function() {
            const property = $(this).find(".node-config-thingtype-"+id+"-property");
            if (!property.length) return;
            const saveValue = property.val();
            populateFnSelect(property, id);
            property.val(saveValue);
        });
    }

    function updateHbFunctions(savedFn) {
        const sel = $("#node-config-input-hbLWT");
        const selectedFn = sel.val();
        populateFnSelect(sel, 'ingress');
        sel.val(savedFn || selectedFn);
        $("#node-config-input-hbType").trigger('change');
    }

    function updateFilterFunctions(savedFn) {
        const sel = $("#node-config-input-filterFunction");
        const selectedFn = sel.val();
        populateFnSelect(sel, 'ingress');
        sel.prepend($("<option></option>").val('0').text("<<No filter>>"));
        sel.val(savedFn || selectedFn || '0');
        sel.trigger('change');
    }


    RED.nodes.registerType('hal2ThingType', {
        category: 'config',
        defaults: {
            name:  {
                value: "Thing type",
                required: true,     
                validate:function(v) {
                    //Check for name collisions
                    const thingsList = RED.nodes.filterNodes({type: "hal2ThingType"});
                    if(thingsList.length===0){ return true; }
                    for (let d in thingsList) {
                        if (v == thingsList[d].name && thingsList[d].id !== this.id) { return false; }
                    }
                    return true;
                }
            },
            contextStore:   {},

                        if (typeof item.output == 'undefined') { item.output = 1; }
                        outputProperty.val(item.output);
                        haTypeProperty.val(item.haType || '');
                        historyProperty.prop('checked', item.history || false);
                        historyAllProperty.prop('checked', item.historyAllUpdates || false);
                    }
                    itemTypeProperty.trigger('change');
                },
                removable: true,
                sortable: true,
                addButton: "Item"
            });

            $("#node-config-thingtype-list-attributes").editableList({
                addItem: function(container,i,opt) {
                    var item = opt;
                    container.css({
                        overflow: 'hidden',
                        whiteSpace: 'nowrap'
                    });

                    //Add rows
                    var rowName = $('<div/>').appendTo(container);
                    var rowDetails = $('<div/>',{style:"margin-top:8px;"})
                        .appendTo(container)
                        .hide()
                    var rowDescription = $('<div/>',{style:"margin-top:8px;"}).appendTo(rowDetails);  
                    var rowRequired = $('<div/>',{style:"margin-top:8px;"}).appendTo(rowDetails);

                    // Show a clickable expand icon
                    var expandButton = $('<span/>', {style: "margin-left:5px; margin-right:10px"})
                        .html('<i class="fa fa-angle-right"></i>')
                        .appendTo(rowName);
                    expandButton.click(function(e) {
                        e.preventDefault();
                        
                        // Switch the icon between expand and compress
                        if (this.firstElementChild.className === "fa fa-angle-right") {
                            this.firstElementChild.className = "fa fa-angle-down";
                        }
                        else {
                            this.firstElementChild.className = "fa fa-angle-right";
                        }
                    
                        // Only show the relevant widget type properties
                        rowDetails.change();
                    });

                    rowDetails.change(function () {
                        if (expandButton.children()[0].className === "fa fa-angle-down") {
                            rowDetails.show();
                        } else {
                            rowDetails.hide();
                        }
                    });

                    //Add labels
                    var labelName = $('<div/>',{style:"display:inline-block;text-align:left; width: 90px; padding-right:10px; box-sizing:border-box;",class:"fa fa-tag"})
                        .appendTo(rowName)
                        .append(' Attribute')
                    var labelDescription = $('<div/>',{style:"display:inline-block;text-align:left; width: 115px; padding-left: 25px;  padding-right:10px; box-sizing:border-box;",class:"fa fa-file"})
                        .appendTo(rowDescription)
                        .append(' Notes')                          
                    var labelrequired = $('<div/>',{style:"display:inline-block;text-align:left; width: 115px; padding-left: 25px; padding-right:10px; box-sizing:border-box;",class:"fa fa-check"})
                        .appendTo(rowRequired)
                        .append(' Required')
                  
                    var nameProperty = $('<input/>',{style: "padding-right:10px; width: calc(100% - 125px)",class:"node-config-thingtype-attribute-name-property",type:"text"})
                        .appendTo(rowName)
                        .prop('required',true);
                    var idProperty = $('<input/>',{class:"node-config-thingtype-attribute-id-property",type:"hidden"})
                        .appendTo(rowName)
                        .val(halCreateId())
                    var notesProperty = $('<textarea/>',{class:"node-config-thingtype-attribute-notes-property",style:"width:calc(100% - 125px)"})
                        .appendTo(rowDescription)
                        var requiredProperty = $('<input/>',{style: "width: calc(100% - 125px)",class:"node-config-thingtype-attribute-required-property",type:"checkbox"})
                        .appendTo(rowRequired)

                    //Add values
                    if (Object.keys(item).length != 0) {
                        nameProperty.val(item.name);
                        idProperty.val(item.id);
                        requiredProperty.prop('checked',item.required);
                        notesProperty.val(item.notes);
                    }
                },
                removable: true,
                sortable: true,
                addButton: "Attribute"
            });

            // Ingress & Egress
            function createFunctionTab(fn_type,fn_default) {
                $('#node-config-'+fn_type+'-list-items').editableList({
                    addItem: function(container,i,opt) {
                        container.css({
                            overflow: 'hidden',
                            whiteSpace: 'nowrap'
                        });    

                        //Add rows
                        var rowName = $('<div/>').appendTo(container);
                        var rowEditor = $('<div/>',{style:"margin-top:8px;"})
                            .appendTo(container)
                            .hide()

                        // Show a clickable expand icon
                        var expandButton = $('<span/>', {style: "margin-left:5px; margin-right:10px;"})
                            .html('<i class="fa fa-angle-right"></i>')
                            .appendTo(rowName);
                        expandButton.click(function(e) {
                            e.preventDefault();
                            
                            // Switch the icon between expand and compress
                            if (this.firstElementChild.className === "fa fa-angle-right") {
                                this.firstElementChild.className = "fa fa-angle-down";
                            }
                            else {
                                this.firstElementChild.className = "fa fa-angle-right";
                            }
                        
                            // Only show the relevant widget type properties
                            rowEditor.change();
                        });

                        rowEditor.change(function () {
                            if (expandButton.children()[0].className === "fa fa-angle-down") {
                                rowEditor.show();
                            } else {
                                rowEditor.hide();
                            }
                        });

                        //Add labels
                        var labelName = $('<div/>',{style:"display:inline-block;text-align:left; width:90px; padding-right:10px; box-sizing:border-box;",class:"fa fa-tag"})
                            .appendTo(rowName)
                            .append(' Name')
                        var labelFnStart = $('<div/>',{style:"display:inline-block;text-align:left; width:90px; padding-right:10px; box-sizing:border-box;",class:"fa fa-cog"})
                            .appendTo(rowEditor)
                            .append(" Function")
                        var labelEditor = $('<div/>',{style:"display:inline-block;text-align:left;float:right; padding-right:10px; box-sizing:border-box;"})
                            .appendTo(rowEditor)

                        //Name property
                        var nameProperty = $('<input/>',{style: "padding-right:10px; width: calc(100% - 195px)",class:"node-config-"+fn_type+"-name-property",type:"text"})
                            .appendTo(rowName)
                        var idProperty = $('<input/>',{class:"node-config-"+fn_type+"-id-property",type:"hidden"})
                            .appendTo(rowName)
                            .val(halCreateId())

                        // Promote-to-central button
                        var promoteButton = $('<button/>',{type:'button',style:'margin-left:5px; padding:2px 8px; font-size:0.8em;',title:'Move this function to the EventHandler\'s shared library'})
                            .html('<i class="fa fa-arrow-up"></i> Promote')
                            .appendTo(rowName);
                        promoteButton.click(function(e) {
                            e.preventDefault();
                            const ehs = getAllEventHandlers();
                            if (ehs.length === 0) {
                                RED.notify('No EventHandler config found.', 'warning');
                                return;
                            }
                            let targetEh;
                            if (ehs.length === 1) {
                                targetEh = ehs[0];
                            } else {
                                const choice = prompt('Promote to which EventHandler?\n' + ehs.map((e,i) => (i+1)+'. '+e.name).join('\n'), '1');
                                const idx = parseInt(choice, 10) - 1;
                                if (isNaN(idx) || idx < 0 || idx >= ehs.length) return;
                                targetEh = ehs[idx];
                            }
                            const id = idProperty.val();
                            const name = nameProperty.val();
                            const editorId = (fn_type + '-' + id).split('.').join('');
                            const fn = editors[editorId] ? editors[editorId].getValue() : '';

                            const ehNode = RED.nodes.node(targetEh.id);
                            if (!ehNode) {
                                RED.notify('Cannot access EventHandler ' + targetEh.name, 'error');
                                return;
                            }
                            const propName = fn_type + 'Library';
                            ehNode[propName] = ehNode[propName] || [];
                            if (ehNode[propName].some(f => f.id === id)) {
                                if (!confirm('A function with id ' + id + ' already exists in '+targetEh.name+'. Overwrite?')) return;
                                ehNode[propName] = ehNode[propName].filter(f => f.id !== id);
                            }
                            ehNode[propName].push({ name: name, id: id, fn: fn });
                            ehNode.changed = true;
                            RED.nodes.dirty(true);

                            // Remove this row from the local list
                            try {
                                $("#node-config-" + fn_type + "-list-items").editableList('removeItem', opt);
                            } catch (err) {
                                const li = container.closest('li');
                                li.find('.red-ui-editableList-item-remove').first().click();
                            }
                            delete editors[editorId];

                            refreshAllItemDropdowns();
                            setTimeout(function() {
                                refreshAllItemDropdowns();
                                RED.notify('Promoted "' + name + '" to ' + targetEh.name + '. Local copy removed.', 'success');
                            }, 100);
                        });

                        //Add name+id values
                        if (Object.keys(opt).length != 0) {
                            nameProperty.val(opt.name);
                            idProperty.val(opt.id);
                        } else {
                            nameProperty.val(fn_type.charAt(0).toUpperCase()+fn_type.slice(1)+" function");
                        }                        
                        var editorId = fn_type+"-"+idProperty.val();
                        editorId = editorId.split('.').join("");
                        var editorProperty = $('<div/>',{id:editorId,style:"height: 250px; min-height:150px;width: calc(100% - 115px);float:right;",class:"red-ui-editor-text-container"})
                            .appendTo(rowEditor)

                        editors[editorId] = RED.editor.createEditor({
                            id: editorId,
                            mode: "ace/mode/nrjavascript",
                            value: "",
                            renderValidationDecorations: "on",
                            globals: {
                                    msg:true,
                                    context:true,
                                    RED: true,
                                    util: true,
                                    flow: true,
                                    global: true,
                                    console: true,
                                    Buffer: true,
                                    setTimeout: true,
                                    clearTimeout: true,
                                    setInterval: true,
                                    clearInterval: true
                                }
                        });
                        //Add editor value
                        if (Object.keys(opt).length != 0) {
                            editors[editorId].setValue(opt.fn);
                        } else {
                            nameProperty.val(fn_type.charAt(0).toUpperCase()+fn_type.slice(1)+" function");
                            editors[editorId].setValue(fn_default);
                        }
                    },
                    removable: true,
                    sortable: true,
                    addButton: "Add "+fn_type+" function"
                });

                //Copy functions from other types
                $('#tab-'+fn_type+'-copy-show').on('click', function() {
                    if ($('#tab-'+fn_type+'-copy').is(':visible')) {
                        $('#tab-'+fn_type+'-copy').hide();
                    } else {
                        $('#tab-'+fn_type+'-copy').show();
                    }
                });

                $('#tab-'+fn_type+'-copy-button').on('click', function () {
                    var thingType = RED.nodes.node($('#tab-'+fn_type+'-copy-thing').val());
                    var selectedFn = $('#tab-'+fn_type+'-copy-'+fn_type).val();
                    for (let n in thingType[fn_type]) {
                        if (thingType[fn_type][n].id == selectedFn) {
                            $('#node-config-'+fn_type+'-list-items').editableList('addItem',thingType[fn_type][n]);
                            $('#node-config-'+fn_type+'-list-items').trigger('change');
                            break;
                        }
                    }
                });

                $('#tab-'+fn_type+'-copy-thing').on('change', function() {
                    $("#tab-"+fn_type+"-copy-"+fn_type).children().remove();
                    var thingType = RED.nodes.node($('#tab-'+fn_type+'-copy-thing').val());
                    if (typeof thingType !== 'undefined') {
                        for (let n in thingType[fn_type]) {
                            $("<option value='" + thingType[fn_type][n].id + "'>" + thingType[fn_type][n].name + "</option>").appendTo("#tab-"+fn_type+"-copy-"+fn_type);
                        }
                    }
                });

                for (let d in thingTypeList) {
                    if (thingTypeList[d].id != node.id) {
                        $("<option value='" + thingTypeList[d].id + "'>" + thingTypeList[d].name + "</option>").appendTo("#tab-"+fn_type+"-copy-thing");
                    }
                }
                $('#tab-'+fn_type+'-copy-thing').trigger('change');
            }

            createFunctionTab('ingress','// msg, item & attribute objects are\n// passed to function\n\nreturn msg.payload;')
            createFunctionTab('egress','// msg, item & attribute objects are\n// passed to function\n\nreturn msg;')

            //Add values
            if (this.ingress) {
                addFunctions('ingress',this.ingress);
            } else {
                addFunctions('ingress',defaultIngressFunctions);
            }

            if (this.egress) {
                addFunctions('egress',this.egress);
            } else {
                addFunctions('egress',defaultEgressFunctions);
            }
            addAttributes(this.attributes);
            addItems(this.items);

            // ── Copy item from another ThingType ──────────────────────────────
            $('#thingtype-copy-item-btn').click(function(e) {
                e.preventDefault();
                pickItemFromThingTypes({
                    title: 'Copy item from another ThingType',
                    subtitle: 'The full item (incl. ID, ingress/egress refs) will be cloned into this ThingType.',
                    excludeTtId: node.id
                }, function(srcItem) {
                    // Deep-clone to avoid sharing references
                    const cloned = JSON.parse(JSON.stringify(srcItem));
                    // Warn on ID collision within this TT
                    let collision = false;
                    $("#node-config-thingtype-list-items").editableList('items').each(function() {
                        if ($(this).find(".node-config-thingtype-id-property").val() === cloned.id) collision = true;
                    });
                    if (collision && !confirm('An item with id ' + cloned.id + ' already exists in this ThingType. Add anyway?')) return;
                    $("#node-config-thingtype-list-items").editableList('addItem', cloned);
                    RED.notify('Item "' + cloned.name + '" copied.', 'success');
                });
            });

            // Add ingress items to heartbeat
            updateHbFunctions(node.hbLWT);
            if (typeof node.filterFunction == 'undefined') {
                node.filterFunction = '0';
            }
            updateFilterFunctions(node.filterFunction);

            // Enable export and import from RED.library
            // RED.library needs #node-input-name to function, hack to keep it in sync with #node-config-input-name
            $('#node-config-input-name').on('change', function() {
                $("#node-input-name").val($('#node-config-input-name').val());
            });

            RED.library.create({
                title: 'ThingType Library',
                mode: 'ace/mode/js',
                url:"hal2ThingType", 
                type:"hal2ThingType",
                editor:editors['statusFn'],
                fields:[
                    {
                        name: 'name',
                        get: function() { return $("#node-config-input-name").val(); },
                        set: function(v) { $("#node-config-input-name").val(v+' (template copy)'); }
                    },                    
                    {
                        name: 'context_store',
                        get: function() { return contextStore = $("#node-config-input-contextStore").val(); },
                        set: function(v) { $("#node-config-input-contextStore").val((contextStores.includes(v)) ? v : contextStores[0]) }
                    },
                    {
                        name: 'show_state',
                        get: function() { return $("#node-config-input-nodestatus").typedInput('value'); },
                        set: function(v) { $("#node-config-input-nodestatus").typedInput('value',v) }
                    },
                    {
                        name: 'show_statetype',
                        get: function() { return $("#node-config-input-nodestatus").typedInput('type'); },
                        set: function(v) { if (typeof v != 'undefined') { $("#node-config-input-nodestatus").typedInput('type',v); }}
                    },
                    {
                        name: 'ingress',
                        get: function() { return JSON.stringify(getFunctions('ingress')); },
                        set: function(v) {
                            addFunctions('ingress',JSON.parse(v));
                            updateMainTab('ingress');
                            updateHbFunctions();
                            updateFilterFunctions();                            
                        }
                    },
                    {
                        name: 'egress',
                        get: function() { return JSON.stringify(getFunctions('egress')); },
                        set: function(v) {
                            addFunctions('egress',JSON.parse(v));
                            updateMainTab('egress');
                        }
                    },
                    {
                        name: 'filter_function',
                        get: function() { return $("#node-config-input-filterFunction").val(); },
                        set: function(v) { $("#node-config-input-filterFunction").val(v) }
                    },
                    {
                        name: 'attributes',
                        get: function() { return JSON.stringify(localGetAttributes()); },
                        set: function(v) { addAttributes(JSON.parse(v)); }
                    },
                    {
                        name: 'items',
                        get: function() { return JSON.stringify(localGetItems()); },
                        set: function(v) { addItems(JSON.parse(v)); }
                    },                    
                    {
                        name: 'check_alive',
                        get: function() { return $("#node-config-input-hbCheck").is(":checked") ? 'true' : 'false'; },
                        set: function(v) { $("#node-config-input-hbCheck").prop("checked",(v == 'true')).trigger('change'); }
                    },
                    {
                        name: 'heartbeat_type',
                        get: function() { return $("#node-config-input-hbType").val(); },
                        set: function(v) { $("#node-config-input-hbType").val(v).trigger('change'); }
                    },
                    {
                        name: 'heartbeat_ttl',
                        get: function() { return $("#node-config-input-hbTTL").val(); },
                        set: function(v) { $("#node-config-input-hbTTL").val(v) }
                    },
                    {
                        name: 'heartbeat_filters',
                        get: function() {
                            var filters = [];
                            $('#hb-filter-list').editableList('items').each(function() {
                                var item = $(this);
                                filters.push({
                                    field:     item.find('.hb-filter-field').typedInput('value'),
                                    matchType: item.find('.hb-filter-match').typedInput('type'),
                                    value:     item.find('.hb-filter-match').typedInput('value')
                                });
                            });
                            return JSON.stringify(filters);
                        },
                        set: function(v) {
                            try {
                                var filters = JSON.parse(v);
                                $('#hb-filter-list').editableList('empty');
                                filters.forEach(function(f) { $('#hb-filter-list').editableList('addItem', f); });
                            } catch(e) {}
                        }
                    },
                    {
                        name: 'heartbeat_filterMode',
                        get: function() { return $("#node-config-input-hbFilterMode").val() || 'and'; },
                        set: function(v) { $("#node-config-input-hbFilterMode").val(v || 'and'); }
                    },
                    {
                        name: 'heartbeat_ingress',
                        get: function() { return ($("#node-config-input-hbLWT").val() === null) ? '' : $("#node-config-input-hbLWT").val(); },
                        set: function(v) { $("#node-config-input-hbLWT").val(v) }
                    },
                    {
                        name: 'heartbeat_timestampProp',
                        get: function() { return ($("#node-config-input-hbPropVal").val() === null) ? '' : $("#node-config-input-hbPropVal").typedInput('value'); },
                        set: function(v) { if (typeof v != 'undefined') { $("#node-config-input-hbPropVal").typedInput('value',v) }}
                    },
                    {
                        name: 'heartbeat_timestampType',
                        get: function() { return ($("#node-config-input-hbPropVal").val() === null) ? '' : $("#node-config-input-hbPropVal").typedInput('type'); },
                        set: function(v) { if (typeof v != 'undefined') { $("#node-config-input-hbPropVal").typedInput('type',v); }}
                    }

                ],
                ext: "template"
            });
        },
        oneditsave: function () {
            var node = this;
            node.attributes = [];
            node.items = [];
            node.ingress = [];
            node.egress = [];
            node.thingStatus = false;
            node.thingCommand = false;
            node.thingOutput = false;
            node.outputs = 0;
            
            node.statusFn = editors['statusFn'].getValue();

            node.attributes = localGetAttributes();
            node.items = localGetItems();

            for (let d in node.items) {
                if (node.items[d].output > node.outputs) { node.outputs = node.items[d].output; }
                switch(node.items[d].type) {
                    case 'both':
                        node.thingStatus = true;
                        node.thingCommand = true;
                        node.thingOutput = true;
                        break;
                    case 'status':
                        node.thingStatus = true;
                        break;
                    case 'command':
                        node.thingCommand = true;
                        node.thingOutput = true;
                        break;
                    case 'loopback_command':
                        node.thingCommand = true;
                        break;
                    case 'loopback_both':
                        node.thingStatus = true;
                        node.thingCommand = true;
                        break;
                }
            }

            // Save hbFilters from list and clear legacy fields
            node.hbFilters = [];
            $('#hb-filter-list').editableList('items').each(function() {
                var item = $(this);
                node.hbFilters.push({
                    field:     item.find('.hb-filter-field').typedInput('value'),
                    matchType: item.find('.hb-filter-match').typedInput('type'),
                    value:     item.find('.hb-filter-match').typedInput('value')
                });
            });
            node.hbFilterVal = '';
            node.hbFilterType = '';

            // Create heartbeat item
            if ($("#node-config-input-hbCheck").is(":checked")) {
                let r = {
                        name: "Alive",
                        id: "1",
                        topicFilters: node.hbFilters,
                        topicFilterMode: $("#node-config-input-hbFilterMode").val() || 'and',
                        topicSuffix: "",
                        readOnly: true,
                        type: 'status',
                        ingress:$("#node-config-input-hbLWT").val(),
                        egress: ""
                }
                node.items.push(r); 
            }

            // Ingress tab
            node.ingress = getFunctions('ingress');

            // Egress tab
            node.egress = getFunctions('egress');

            // Remove editors
            for (let n in editors) {
                editors[n].destroy();
                delete editors[n];
            }
        },
        oneditcancel: function() {
            // Remove editors
            for (let n in editors) {
                editors[n].destroy();
                delete editors[n];
            }
        }
    });
</script>
